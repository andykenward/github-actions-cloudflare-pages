# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: sync-readme-versions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  sync:
    if: ${{ github.repository == 'andykenward/github-actions-cloudflare-pages' }}
    name: Sync action version references
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: main
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
      - name: Sync action version references
        run: pnpm run sync:readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Commit and push version reference updates
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'docs: update action version references [skip ci]'
          sign-commits: true
          title: 'docs: update action version references'
          branch: docs/sync-action-versions
          delete-branch: true
          add-paths: |
            README.md
            delete/README.md
            .github/workflow-templates/deploy.yml
            .github/workflow-templates/delete.yml
