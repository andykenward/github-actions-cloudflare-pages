# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: deploy-fork
on:
  workflow_run:
    workflows:
      - test
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}

jobs:
  deploy-fork:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read
      deployments: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - if: github.event_name == 'workflow_run'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: pr-number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"

          if [[ -z "$pr_number" ]]; then
            pr_number="$(curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
              | jq -r '.[0].number // empty')"
          fi

          if [[ -z "$pr_number" ]]; then
            echo "Unable to resolve PR number for workflow_run head_sha=${HEAD_SHA}" >&2
            exit 1
          fi

          echo "value=$pr_number" >> "$GITHUB_OUTPUT"
