# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: deploy
on:
  workflow_run:
    workflows:
      - test
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run actiomn against'
        type: environment
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}

jobs:
  cloudflare-pages-deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_branch != 'main') }}
    permissions:
      actions: read
      contents: read
      deployments: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - if: github.event_name == 'workflow_run'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}
      - if: github.event_name != 'workflow_run'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - id: 'cloudflare-pages'
        uses: ./
        with:
          cloudflare-api-token: ${{secrets.CLOUDFLARE_API_TOKEN}}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-project-name: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
          directory: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-environment: ${{ inputs.environment || 'preview' }}
          working-directory: example
